name: Release announce

# Posts the matching docs/blog/*.md to Dev.to when a GitHub Release is published.
# Requires repo secret DEVTO_API_KEY (https://dev.to/settings/extensions).
#
# Default: creates a *draft* so you can review before it hits the feed.
# Set repo variable DEVTO_PUBLISH=true to publish immediately.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      blog_path:
        description: "Path to markdown under docs/blog/"
        required: true
        default: "docs/blog/0.2.3-agent-shield.md"
      publish:
        description: "Publish immediately (true/false)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  devto:
    runs-on: ubuntu-latest
    steps:
      - name: Require DEVTO_API_KEY
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          if [ -z "${DEVTO_API_KEY}" ]; then
            echo "DEVTO_API_KEY secret is not set — skipping Dev.to announce."
            echo "Add it under Settings → Secrets → Actions (see docs/maintainers/LAUNCH.md)."
            exit 0
          fi
          echo "has_key=true" >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: env.has_key == 'true'

      - name: Set up Python
        if: env.has_key == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Resolve blog post path
        if: env.has_key == 'true'
        id: blog
        env:
          TAG: ${{ github.event.release.tag_name || '' }}
          INPUT_PATH: ${{ github.event.inputs.blog_path || '' }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_PATH}" ]; then
            echo "path=${INPUT_PATH}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # v0.2.3 -> look for docs/blog/0.2.3-*.md
          ver="${TAG#v}"
          match=$(ls docs/blog/"${ver}"-*.md 2>/dev/null | head -1 || true)
          if [ -z "${match}" ]; then
            echo "No docs/blog/${ver}-*.md found; skipping Dev.to post."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "path=${match}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Post to Dev.to
        if: env.has_key == 'true' && steps.blog.outputs.skip != 'true'
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          DEVTO_PUBLISH: ${{ github.event.inputs.publish || vars.DEVTO_PUBLISH || 'false' }}
          RELEASE_URL: ${{ github.event.release.html_url || '' }}
        run: |
          set -euo pipefail
          args=("${{ steps.blog.outputs.path }}")
          if [ "${DEVTO_PUBLISH}" = "true" ]; then
            args+=(--publish)
          fi
          if [ -n "${RELEASE_URL}" ]; then
            args+=(--canonical-url "${RELEASE_URL}")
          fi
          python scripts/post_devto.py "${args[@]}"
