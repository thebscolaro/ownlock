name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # Fast PR feedback: every OS + Python combination, no subprocess smoke tests.
  # Subprocess smoke is covered by the dedicated `smoke` job below so a typo
  # in test_smoke.py won't block the unit-test signal.
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26"
          pip install -e ".[mcp,dev]"
          pip install pytest

      - name: Run tests (fast — excludes smoke)
        run: pytest tests/ -v --tb=short -m "not smoke"

      - name: Coverage (ubuntu 3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          pytest tests/ -m "not smoke" --cov=ownlock --cov-report=term-missing --cov-report=html --cov-fail-under=84

      - name: Upload coverage HTML
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

  # End-to-end subprocess smoke tests. Single OS/Python (ubuntu / 3.12) is
  # enough — smoke covers wiring, not platform behavior. Splitting it out
  # keeps fast feedback on PRs from being blocked by a flaky subprocess test.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26"
          pip install -e ".[mcp]"
          pip install pytest

      - name: Run smoke tests
        run: pytest tests/ -v --tb=short -m smoke

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and audit
        # CVE-2026-3219 is a pip-in-pip advisory (polyglot tar+zip install):
        # fix is merged upstream in pypa/pip#13870 but not yet in a released
        # pip. Local-only, requires user interaction, no confidentiality
        # impact. Remove this ignore once a pip release containing the fix
        # is on PyPI.
        run: |
          python -m pip install --upgrade "pip>=26"
          pip install -e ".[dev,mcp]"
          bandit -r ownlock -c pyproject.toml -f txt
          pip-audit --ignore-vuln CVE-2026-3219

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Only publish after build succeeds AND tests/security/smoke all pass (avoid uploading broken releases).
  publish:
    needs: [test, smoke, security, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
